kind = "web"
previewPath = "/"
title = "Zalo Edu Mini App"
version = "1.0.0"
id = "artifacts/zalo-edu"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25441

[services.development]
run = "pnpm --filter @workspace/zalo-edu run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zalo-edu", "run", "build" ]
publicDir = "artifacts/zalo-edu/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25441"
BASE_PATH = "/"
